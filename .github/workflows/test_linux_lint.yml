# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Linting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14", "3.15"]

    steps:
    - uses: actions/checkout@v5
    - name: "Set up Python ${{ matrix.python-version }}"
      uses: actions/setup-python@v6
      with:
          python-version: "${{ matrix.python-version }}"
    - name: Install flake8
      run: |
        python -m pip install --upgrade pip
        pip install flake8 wheel
    - name: "Lint with flake8"
      run: |
        python -c "import sys; print(sys.version)"
        # stop the build if there are Python syntax errors or undefined names
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 docs --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 test --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 src --count --exit-zero --max-complexity=50 --max-line-length=79 --statistics
        flake8 docs --count --exit-zero --max-complexity=50 --max-line-length=79 --statistics
        flake8 test --count --exit-zero --max-complexity=50 --max-line-length=79 --statistics
